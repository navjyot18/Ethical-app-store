version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: app_analyzer_db
    environment:
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: app_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
